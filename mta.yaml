_schema-version: 3.3.0
ID: school-capm
version: 1.0.0
description: "A simple CAP project."
parameters:
  enable-parallel-deployments: true
  deploy_mode: html5-repo
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
modules:
  - name: school-capm-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: school-capm-auth
      - name: school-capm-db
      - name: school-capm-connectivity
      - name: school-capm-destination
  - name: school-capm-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: school-capm-db
  - name: school-capm
    type: approuter.nodejs
    path: app/approuter
    parameters:
      keep-existing-routes: true
      memory: 256M
      disk-quota: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: school-capm-auth
      - name: school-capm-html5-runtime
    provides:
      - name: app-api
        properties:
          app-protocol: ${protocol}
          app-uri: ${default-uri}
  - name: schoolui
    type: html5
    path: app/schoolui
    build-parameters:
      builder: custom
      commands:
        - npm ci
        - npm run build:cf
      build-result: dist
      supported-platforms:
        []
  - name: school-capm-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: school-capm-auth
      - name: srv-api
      - name: school-capm-html5-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: schoolui
          artifacts:
            - schoolui.zip
          target-path: app/
  - name: school-capm-destination-content
    type: com.sap.application.content
    requires:
      - name: school-capm-destination
        parameters:
          content-target: true
      - name: school-capm-auth
        parameters:
          service-key:
            name: school-capm-auth-key
      - name: srv-api
    parameters:
      content:
        subaccount:
          existing_destinations_policy: update
          destinations:
            - Name: srv-api
              Authentication: OAuth2ClientCredentials
              HTML5.DynamicDestination: true
              URL: ~{srv-api/srv-url}
              TokenServiceInstanceName: school-capm-auth
              TokenServiceKeyName: school-capm-auth-key
              WebIDEEnabled: true
    build-parameters:
      no-source: true
resources:
  - name: school-capm-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: school-capm-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
          redirect-uris:
            - https://*~{app-api/app-uri}/**
    requires:
      - name: app-api
  - name: school-capm-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: school-capm-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
  - name: school-capm-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
  - name: school-capm-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  - name: school-capm-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime
